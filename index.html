<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>João Lourenço</title>
</head>
<body>

<script>
  (function() {
    var lang = (navigator.language || navigator.userLanguage || 'fr').toLowerCase().split('-')[0];
    var base = 'https://www.math.univ-paris13.fr/~lourenco/';
    if (lang === 'pt' || lang === 'es') {
      window.location.replace(base + 'index.pt.html');
    } else if (lang === 'en') {
      window.location.replace(base + 'index.en.html');
    } else if (lang === 'de') {
      window.location.replace(base + 'index.de.html');
    } else {
      window.location.replace(base + 'index.html');
    }
  })();
</script>

<p id="msg"></p>

<script>
  var lang = (navigator.language || navigator.userLanguage || 'fr').toLowerCase().split('-')[0];
  var base = 'https://www.math.univ-paris13.fr/~lourenco/';
  var messages = {
    fr: 'Cette page a été déplacée vers ',
    en: 'This page has moved to ',
    pt: 'Esta página foi transferida para ',
    de: 'Diese Seite wurde verschoben nach '
  };
  var target = (lang === 'pt' || lang === 'es') ? base + 'index.pt.html'
             : lang === 'en' ? base + 'index.en.html'
             : lang === 'de' ? base + 'index.de.html'
             : base + 'index.html';
  var msg = messages[lang] || messages['fr'];
  document.getElementById('msg').innerHTML = msg + '<a href="' + target + '">' + target + '</a>.';
</script>

</body>
</html>
